    #mechCanvas{position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:1;opacity:0.15}

  <!-- Universe Background -->
  <canvas id="starfield"></canvas>

    <div class="wormhole-ring"></div>
    <div class="wormhole-ring"></div>
    <div class="wormhole-ring"></div>
    <div class="wormhole-ring"></div>
    <div class="wormhole-core"></div>
  </div>
  <div class="energy-ripple"><span></span><span></span><span></span><span></span></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <!-- Cyberpunk Character Animation -->
  <div id="cyber-character" aria-hidden="true">
    <svg id="char-svg" viewBox="0 0 400 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- Hair gradient -->
        <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1a3a8f"/>
          <stop offset="50%" stop-color="#2563eb"/>
          <stop offset="100%" stop-color="#60a5fa"/>
        </linearGradient>
        <!-- Skin gradient -->
        <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e8d5c4"/>
          <stop offset="100%" stop-color="#c8a882"/>
        </linearGradient>
        <!-- Crack glow -->
        <filter id="crackGlow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Armor gradient -->
        <linearGradient id="armorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1e293b"/>
          <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
        <!-- Particle glow -->
        <filter id="particleGlow">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Fade out mask for phase 3 -->
        <radialGradient id="fadeOut" cx="50%" cy="50%" r="50%">
          <stop offset="40%" stop-color="white" stop-opacity="1"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <mask id="charMask">
          <rect width="400" height="700" fill="url(#fadeOut)"/>
        </mask>
      </defs>

      <!-- ===== BODY GROUP (neck vibration phase 2) ===== -->
      <g id="body-group">
        <!-- Shoulders / upper body armor -->
        <ellipse cx="200" cy="580" rx="120" ry="60" fill="url(#armorGrad)" opacity="0.95"/>
        <rect x="100" y="540" width="200" height="80" rx="10" fill="#0f172a" opacity="0.9"/>
        <!-- Shoulder armor plates -->
        <path d="M100,540 Q70,520 80,490 Q110,510 120,540 Z" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
        <path d="M300,540 Q330,520 320,490 Q290,510 280,540 Z" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
        <!-- Chest panel lines -->
        <line x1="160" y1="550" x2="240" y2="550" stroke="#3b82f6" stroke-width="0.8" opacity="0.6"/>
        <line x1="150" y1="560" x2="250" y2="560" stroke="#60a5fa" stroke-width="0.5" opacity="0.4"/>
        <circle cx="200" cy="545" r="8" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
        <circle cx="200" cy="545" r="4" fill="#06b6d4" opacity="0.5"/>

        <!-- ===== NECK + METAL PARTS ===== -->
        <g id="neck-group">
          <rect x="182" y="450" width="36" height="80" rx="8" fill="url(#skinGrad)" opacity="0.9"/>
          <!-- Neck metal rings -->
          <rect x="178" y="465" width="44" height="8" rx="4" fill="#334155" stroke="#64748b" stroke-width="0.8"/>
          <rect x="178" y="480" width="44" height="8" rx="4" fill="#334155" stroke="#64748b" stroke-width="0.8"/>
          <!-- Metal accent lines -->
          <line x1="190" y1="470" x2="210" y2="470" stroke="#06b6d4" stroke-width="0.8" opacity="0.8"/>
          <line x1="190" y1="485" x2="210" y2="485" stroke="#06b6d4" stroke-width="0.8" opacity="0.8"/>
        </g>
      </g>

      <!-- ===== HEAD GROUP ===== -->
      <g id="head-group" mask="url(#charMask)">
        <!-- Head base -->
        <ellipse cx="200" cy="300" rx="85" ry="100" fill="url(#skinGrad)"/>
        <!-- Jaw/chin -->
        <path d="M140,350 Q200,420 260,350" fill="url(#skinGrad)"/>

        <!-- ===== EYES ===== -->
        <g id="eyes-group">
          <!-- Left eye -->
          <ellipse cx="168" cy="295" rx="18" ry="10" fill="#0f172a"/>
          <ellipse cx="168" cy="295" rx="12" ry="8" fill="#1e3a5f"/>
          <circle cx="168" cy="295" r="6" fill="#06b6d4"/>
          <circle cx="170" cy="293" r="2" fill="white" opacity="0.8"/>
          <!-- Left eyelashes (top) -->
          <g id="lash-left" transform-origin="168 287">
            <line x1="152" y1="288" x2="148" y2="280" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="160" y1="285" x2="158" y2="277" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="168" y1="284" x2="168" y2="276" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="176" y1="285" x2="178" y2="277" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="183" y1="288" x2="187" y2="281" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
          </g>

          <!-- Right eye -->
          <ellipse cx="232" cy="295" rx="18" ry="10" fill="#0f172a"/>
          <ellipse cx="232" cy="295" rx="12" ry="8" fill="#1e3a5f"/>
          <circle cx="232" cy="295" r="6" fill="#06b6d4"/>
          <circle cx="234" cy="293" r="2" fill="white" opacity="0.8"/>
          <!-- Right eyelashes (top) -->
          <g id="lash-right" transform-origin="232 287">
            <line x1="216" y1="288" x2="212" y2="280" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="224" y1="285" x2="222" y2="277" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="232" y1="284" x2="232" y2="276" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="240" y1="285" x2="242" y2="277" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="247" y1="288" x2="251" y2="281" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
          </g>
        </g>

        <!-- Nose -->
        <path d="M195,320 Q200,340 205,320" fill="none" stroke="rgba(180,140,100,0.4)" stroke-width="1.5"/>

        <!-- Lips -->
        <path d="M178,365 Q200,378 222,365" fill="none" stroke="#b45e6a" stroke-width="2" stroke-linecap="round"/>
        <path d="M182,365 Q200,372 218,365" fill="rgba(180,80,100,0.3)"/>

        <!-- ===== RIGHT CHEEK CRACK EFFECT ===== -->
        <g id="crack-group" filter="url(#crackGlow)">
          <path d="M245,310 L255,325 L248,335 L260,350 L252,365" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M255,325 L265,320" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
          <path d="M248,335 L238,340" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
          <!-- Sub-cracks -->
          <path d="M250,318 L258,314" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.5"/>
          <path d="M252,342 L244,346" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.5"/>
        </g>

        <!-- Cyber eye enhancement (right eye ring) -->
        <circle cx="232" cy="295" r="15" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.5"/>
        <circle cx="232" cy="295" r="20" fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.3" stroke-dasharray="3,3"/>

        <!-- Ear tech -->
        <rect x="113" y="305" width="12" height="20" rx="3" fill="#334155" stroke="#06b6d4" stroke-width="0.8"/>
        <circle cx="119" cy="310" r="3" fill="#06b6d4" opacity="0.8"/>
      </g>

      <!-- ===== HAIR GROUP (main animation phase 1) ===== -->
      <g id="hair-group">
        <!-- Hair base / top -->
        <path d="M130,200 Q160,150 200,140 Q240,150 270,200 Q260,180 200,175 Q140,180 130,200 Z" fill="url(#hairGrad)"/>

        <!-- Main hair strands - left side -->
        <g id="hair-strands-left">
          <path id="hs1" d="M140,210 Q120,280 110,380 Q105,440 115,500" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
          <path id="hs2" d="M155,205 Q130,290 125,390 Q120,460 130,520" fill="none" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
          <path id="hs3" d="M170,200 Q148,300 145,400 Q142,470 148,530" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
          <path id="hs4" d="M130,220 Q100,300 95,400 Q90,460 100,510" fill="none" stroke="#1e40af" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
        </g>

        <!-- Main hair strands - right side -->
        <g id="hair-strands-right">
          <path id="hs5" d="M260,210 Q280,280 290,380 Q295,440 285,500" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
          <path id="hs6" d="M245,205 Q270,290 275,390 Q280,460 270,520" fill="none" stroke="#1d4ed8" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
          <path id="hs7" d="M230,200 Q252,300 255,400 Q258,470 252,530" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
          <path id="hs8" d="M270,220 Q300,300 305,400 Q310,460 300,510" fill="none" stroke="#1e40af" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
        </g>

        <!-- Hair light particles -->
        <g id="hair-particles" filter="url(#particleGlow)">
          <circle class="hp" cx="125" cy="320" r="2" fill="#60a5fa"/>
          <circle class="hp" cx="135" cy="380" r="1.5" fill="#93c5fd"/>
          <circle class="hp" cx="118" cy="450" r="2" fill="#60a5fa"/>
          <circle class="hp" cx="145" cy="290" r="1.5" fill="#bfdbfe"/>
          <circle class="hp" cx="110" cy="420" r="2.5" fill="#3b82f6"/>
          <circle class="hp" cx="285" cy="320" r="2" fill="#60a5fa"/>
          <circle class="hp" cx="275" cy="380" r="1.5" fill="#93c5fd"/>
          <circle class="hp" cx="292" cy="450" r="2" fill="#60a5fa"/>
          <circle class="hp" cx="265" cy="290" r="1.5" fill="#bfdbfe"/>
          <circle class="hp" cx="300" cy="420" r="2.5" fill="#3b82f6"/>
        </g>
      </g>
    </svg>
  </div>

  <!-- Sci-Fi Animation Showcase -->
  <section class="relative z-10 py-16 px-4 overflow-hidden">
    <div class="max-w-5xl mx-auto">
      <div class="text-center mb-10 reveal">
        <p class="font-cyber text-xs tracking-[0.25em] text-violet-400/60 mb-3">// 深空档案</p>
        <h2 class="font-cyber text-2xl sm:text-3xl font-bold section-title mb-2">星际全息投影</h2>
      </div>
      <div class="scifi-showcase reveal">
        <div class="scifi-viewport">
          <!-- 1. 机甲战士 -->
          <div class="scifi-slide">
            <svg class="scifi-svg" viewBox="0 0 400 300">
              <defs>
                <linearGradient id="mechG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
                <filter id="glow1"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              </defs>
              <!-- 机甲身体 -->
              <rect x="170" y="80" width="60" height="90" rx="8" fill="url(#mechG)" opacity="0.9"/>
              <!-- 头部 -->
              <rect x="180" y="50" width="40" height="35" rx="6" fill="#6366f1"/>
              <rect x="190" y="58" width="20" height="8" rx="2" fill="#22d3ee" filter="url(#glow1)" class="scifi-blink"/>
              <!-- 手臂 -->
              <rect x="140" y="90" width="30" height="12" rx="4" fill="#4f46e5" class="scifi-arm-l"/>
              <rect x="230" y="90" width="30" height="12" rx="4" fill="#4f46e5" class="scifi-arm-r"/>
              <!-- 武器 -->
              <rect x="255" y="82" width="40" height="6" rx="2" fill="#22d3ee" filter="url(#glow1)" class="scifi-arm-r"/>
              <!-- 腿 -->
              <rect x="178" y="170" width="18" height="50" rx="4" fill="#4338ca"/>
              <rect x="204" y="170" width="18" height="50" rx="4" fill="#4338ca"/>
              <!-- 脚 -->
              <rect x="172" y="215" width="28" height="10" rx="3" fill="#3730a3"/>
              <rect x="200" y="215" width="28" height="10" rx="3" fill="#3730a3"/>
              <!-- 胸部反应堆 -->
              <circle cx="200" cy="115" r="10" fill="#22d3ee" filter="url(#glow1)" class="scifi-pulse"/>
              <!-- 肩甲 -->
              <polygon points="165,80 175,65 175,95" fill="#6366f1"/>
              <polygon points="235,80 225,65 225,95" fill="#6366f1"/>
              <!-- 地面光 -->
              <ellipse cx="200" cy="232" rx="50" ry="6" fill="#818cf8" opacity="0.15" class="scifi-pulse"/>
              <text x="200" y="275" text-anchor="middle" fill="#64748b" font-size="12" font-family="Orbitron,monospace" letter-spacing="0.1em">MECH-X7 战术机甲</text>
            </svg>
          </div>
          <!-- 2. 宇宙飞船 -->
          <div class="scifi-slide">
            <svg class="scifi-svg" viewBox="0 0 400 300">
              <defs>
                <linearGradient id="shipG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
                <filter id="glow2"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              </defs>
              <!-- 船体 -->
              <ellipse cx="200" cy="140" rx="120" ry="30" fill="#0e7490" opacity="0.8"/>
              <ellipse cx="200" cy="140" rx="80" ry="20" fill="#155e75"/>
              <!-- 驾驶舱 -->
              <ellipse cx="200" cy="128" rx="30" ry="15" fill="url(#shipG)" opacity="0.9"/>
              <ellipse cx="200" cy="126" rx="18" ry="8" fill="#22d3ee" opacity="0.4" class="scifi-blink"/>
              <!-- 机翼 -->
              <polygon points="80,140 40,155 100,150" fill="#0e7490"/>
              <polygon points="320,140 360,155 300,150" fill="#0e7490"/>
              <!-- 引擎尾焰 -->

  <script>
  (function(){
    const slides=document.querySelectorAll('.scifi-slide');
    const dots=document.querySelectorAll('.scifi-dot');
    if(!slides.length)return;
    let cur=0;
    slides[0].classList.add('active');
    function go(i){
      slides[cur].classList.remove('active');
      dots[cur].classList.remove('active');
      cur=i%slides.length;
      slides[cur].classList.add('active');
      dots[cur].classList.add('active');
    }
    let timer=setInterval(()=>go(cur+1),3000);
    dots.forEach(d=>d.addEventListener('click',()=>{
      clearInterval(timer);
      go(+d.dataset.idx);
      timer=setInterval(()=>go(cur+1),3000);
    }));
  })();
  </script>
  <script>
  (function(){
    var canvas=document.createElement('canvas');
    canvas.id='cursorTrail';
    canvas.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999';
    document.body.appendChild(canvas);
    var ctx=canvas.getContext('2d'),w,h,particles=[];
    function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight}
    resize();window.addEventListener('resize',resize);
    var mx=w/2,my=h/2;
    document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;
      for(var i=0;i<3;i++){
        particles.push({
          x:mx,y:my,
          vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,
          r:Math.random()*2.5+0.5,
          life:1,
          decay:Math.random()*.025+.015,
          color:['129,140,248','34,211,238','192,132,252','99,102,241'][Math.floor(Math.random()*4)]
        });
      }
    });
    function draw(){
      ctx.clearRect(0,0,w,h);
      for(var i=particles.length-1;i>=0;i--){
        var p=particles[i];
        p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
        if(p.life<=0){particles.splice(i,1);continue}
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
        ctx.fillStyle='rgba('+p.color+','+p.life*.6+')';
        ctx.fill();
        if(p.r>1.5){
          ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life*2.5,0,Math.PI*2);
          ctx.fillStyle='rgba('+p.color+','+p.life*.08+')';ctx.fill();
        }
      }
      if(particles.length>300)particles.splice(0,particles.length-300);
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  })();
  </script>
