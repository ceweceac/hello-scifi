  <link rel="stylesheet" href="styles.css" />
</head>
<body class="scanlines">

  <!-- Universe Background -->
  <canvas id="starfield"></canvas>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div class="nebula nebula-4"></div>
  <div class="wormhole">
    <div class="wormhole-ring"></div>
    <div class="wormhole-ring"></div>
    <div class="wormhole-ring"></div>
    <div class="wormhole-ring"></div>
    <div class="wormhole-ring"></div>
    <div class="wormhole-core"></div>

  <div class="energy-ripple"><span></span><span></span><span></span><span></span></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <!-- Navigation -->
  <nav id="navbar" class="nav-glass fixed top-0 left-0 w-full z-50">

            <span class="font-cyber text-sm font-black text-white tracking-tight">Hi</span>
            <span class="absolute -top-1 -right-1 flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-cyan-400 shadow-lg shadow-cyan-400/50"></span>
            </span>
          </div>
          <span class="font-cyber text-lg font-bold bg-gradient-to-r from-indigo-300 to-violet-400 bg-clip-text text-transparent tracking-widest">Hello</span>

        <div class="hidden md:flex items-center gap-1">

          <a href="features.html"  class="nav-link font-cyber text-xs tracking-wider">功能</a>
          <a href="tech.html"      class="nav-link font-cyber text-xs tracking-wider">技术</a>
          <a href="about.html"     class="nav-link font-cyber text-xs tracking-wider">关于</a>
          <a href="ai-character-card/character.html" class="nav-link font-cyber text-xs tracking-wider">角色</a>
        </div>

        <div class="hidden md:flex items-center gap-4">
          <a href="console.html" class="btn-neon text-xs font-cyber tracking-wider">启动控制台</a>
          <button class="user-avatar-btn" title="登录 / 注册">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </button>
        </div>

        <button id="menuBtn" class="md:hidden relative w-9 h-9 flex flex-col items-center justify-center gap-1.5 group" aria-label="Menu">
          <span class="block w-6 h-0.5 bg-indigo-400 rounded transition-all duration-300 origin-center group-[.open]:rotate-45 group-[.open]:translate-y-[4px]"></span>
          <span class="block w-6 h-0.5 bg-indigo-400 rounded transition-all duration-300 group-[.open]:opacity-0"></span>
          <span class="block w-6 h-0.5 bg-indigo-400 rounded transition-all duration-300 origin-center group-[.open]:-rotate-45 group-[.open]:-translate-y-[4px]"></span>
        </button>
      </div>
      <div id="mobileMenu" class="mobile-menu md:hidden">
        <div class="py-3 space-y-1 border-t border-indigo-500/10">
          <a href="index.html"     class="block nav-link active font-cyber text-xs tracking-wider">首页</a>
          <a href="features.html"  class="block nav-link font-cyber text-xs tracking-wider">功能</a>
          <a href="tech.html"      class="block nav-link font-cyber text-xs tracking-wider">技术</a>

            <button class="user-avatar-btn" style="width:42px;height:42px;" title="登录 / 注册">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>

  <!-- Hero -->
  <section class="relative z-10 min-h-screen flex items-center justify-center px-4 pt-16">
    <div class="text-center max-w-3xl mx-auto page-enter">
      <p class="font-cyber text-xs tracking-[0.3em] text-indigo-400/70 mb-4 animate-pulse">// 宇宙星门已上线</p>
      <h1 class="font-cyber text-4xl sm:text-5xl lg:text-6xl font-black leading-tight mb-6">
        <span class="bg-gradient-to-r from-indigo-300 via-violet-400 to-cyan-400 bg-clip-text text-transparent">Hello</span>
        <br/>
        <span class="text-slate-300 text-2xl sm:text-3xl lg:text-4xl font-bold">深空宇宙导航平台</span>
      </h1>
      <p class="text-slate-400 text-base sm:text-lg max-w-xl mx-auto mb-10 leading-relaxed">
        穿越星际虫洞，驶入未知宇宙。融合深空美学与量子交互，为前沿科技产品打造沉浸式星际体验。
      </p>
      <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <a href="ai-studio.html" class="btn-neon font-cyber text-sm tracking-wider px-8 py-3">
          进入星门 <span class="inline-block ml-2 animate-pulse">&#9737;</span>
        </a>
        <a href="features.html" class="font-cyber text-xs tracking-wider text-slate-400 hover:text-cyan-400 transition-colors duration-500 flex items-center gap-2">
          探索星系
          <svg class="w-4 h-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </a>
      </div>
      <div class="mt-16 flex items-center justify-center gap-6 text-xs font-cyber tracking-wider text-slate-500">
        <span>第七星区</span>
        <span class="w-1 h-1 rounded-full bg-indigo-500/50"></span>
        <span>恒星: 240万</span>
        <span class="w-1 h-1 rounded-full bg-indigo-500/50"></span>
        <span>曲速: 就绪</span>
        <span class="w-1 h-1 rounded-full bg-cyan-500/50"></span>
        <span>信号: 98.7%</span>
      </div>
    </div>
  </section>

    <div class="max-w-6xl mx-auto">
      <div class="text-center mb-16 reveal">
        <p class="font-cyber text-xs tracking-[0.25em] text-cyan-400/60 mb-3">// 快捷入口</p>
        <h2 class="font-cyber text-3xl sm:text-4xl font-bold section-title mb-4">星际入口</h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <a href="console.html" class="glass-card p-6 reveal block group cursor-pointer">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-400/20 to-violet-500/20 border border-indigo-500/20 flex items-center justify-center mb-4 group-hover:border-indigo-400/50 transition-all">
            <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </div>

          <p class="text-slate-500 text-xs">进入星舰主控制台仪表盘</p>
        </a>
        <a href="features.html" class="glass-card p-6 reveal block group cursor-pointer">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-400/20 to-blue-500/20 border border-cyan-500/20 flex items-center justify-center mb-4 group-hover:border-cyan-400/50 transition-all">
            <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          </div>
          <h3 class="font-cyber text-sm font-bold text-cyan-300 mb-2 tracking-wide">核心功能</h3>
          <p class="text-slate-500 text-xs">探索星舰核心模块系统</p>
        </a>
        <a href="tech.html" class="glass-card p-6 reveal block group cursor-pointer">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-violet-400/20 to-purple-500/20 border border-violet-500/20 flex items-center justify-center mb-4 group-hover:border-violet-400/50 transition-all">
            <svg class="w-6 h-6 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          </div>
          <h3 class="font-cyber text-sm font-bold text-violet-300 mb-2 tracking-wide">技术指标</h3>
          <p class="text-slate-500 text-xs">实时星际系统运行数据</p>
        </a>
        <a href="about.html" class="glass-card p-6 reveal block group cursor-pointer">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-400/20 to-teal-500/20 border border-emerald-500/20 flex items-center justify-center mb-4 group-hover:border-emerald-400/50 transition-all">
            <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <h3 class="font-cyber text-sm font-bold text-emerald-300 mb-2 tracking-wide">关于星门</h3>
          <p class="text-slate-500 text-xs">了解Hello深空项目</p>

      <p class="font-cyber tracking-wider text-slate-600">铸造于宇宙之心</p>
