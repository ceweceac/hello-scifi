<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body class="scanlines">

  <canvas id="starfield"></canvas>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div class="nebula nebula-4"></div>
  <div class="wormhole">
    <div class="wormhole-ring"></div><div class="wormhole-ring"></div><div class="wormhole-ring"></div><div class="wormhole-ring"></div><div class="wormhole-ring"></div>
    <div class="wormhole-core"></div>
  </div>
  <div class="energy-ripple"><span></span><span></span><span></span><span></span></div>
  <div class="shooting-star"></div><div class="shooting-star"></div><div class="shooting-star"></div><div class="shooting-star"></div>

  <!-- Login -->
  <div class="login-container relative z-10">
    <div class="login-card page-enter">

      <!-- Logo -->
      <div class="login-logo">
        <span class="font-cyber text-xl font-black text-white tracking-tight">Hi</span>
      </div>
      <h1 class="text-center font-cyber text-lg font-bold bg-gradient-to-r from-indigo-300 to-violet-400 bg-clip-text text-transparent tracking-widest mb-1">Hello</h1>
      <p class="text-center text-xs text-slate-500 mb-6">星际身份认证系统</p>

      <!-- Tabs -->
      <div class="login-tabs">
        <button class="login-tab active" data-tab="loginForm">登录</button>
        <button class="login-tab" data-tab="registerForm">注册</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="login-form active" autocomplete="off">
        <div class="login-field">
          <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <input type="email" name="email" placeholder="星际邮箱地址" />
        </div>
        <div class="login-field">
          <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" name="password" placeholder="访问密钥" />
          <button type="button" class="pwd-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="captcha-row">
          <div class="login-field" style="margin-bottom:0;flex:1">
            <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            <input type="text" name="captcha" placeholder="验证码" maxlength="4" />
          </div>
          <canvas class="captcha-canvas"></canvas>
        </div>
        <div class="login-error"></div>
        <button type="submit" class="login-submit font-cyber tracking-wider">登 录</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="login-form" autocomplete="off">
        <div class="login-field">
          <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <input type="text" name="username" placeholder="星际代号（2-30字符）" />
        </div>
        <div class="login-field">
          <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <input type="email" name="email" placeholder="星际邮箱地址" />
        </div>
        <div class="login-field">
          <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" name="password" placeholder="设置访问密钥（至少6位）" />
          <button type="button" class="pwd-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="login-field">
          <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" name="password2" placeholder="确认访问密钥" />
        </div>
        <div class="captcha-row">
          <div class="login-field" style="margin-bottom:0;flex:1">
            <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            <input type="text" name="captcha" placeholder="验证码" maxlength="4" />
          </div>
          <canvas class="captcha-canvas"></canvas>
        </div>
        <div class="login-error"></div>
        <button type="submit" class="login-submit font-cyber tracking-wider">注 册</button>
      </form>

      <!-- Links -->
      <div class="login-links">
        <a href="../index.html">返回首页</a>
      </div>

    </div>
  </div>

  <script src="../auth-api.js"></script>
  <script src="../scripts.js"></script>
  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
