<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI分镜大师 — 登录</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="starfield"></div>

  <div class="app-container">

    <!-- Nav -->
    <nav class="top-nav">
      <a href="/" class="nav-logo">
        <div class="nav-logo-icon">AI</div>
        <span class="nav-logo-text">分镜大师</span>
      </a>
    </nav>

    <!-- Auth -->
    <div class="page-content">
      <div class="auth-card">

        <div class="auth-logo"><span>AI</span></div>
        <div class="auth-title">AI 分镜大师</div>
        <div class="auth-subtitle">星际身份认证系统</div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="loginForm">登录</button>
          <button class="auth-tab" data-tab="registerForm">注册</button>
        </div>

        <!-- Login -->
        <form id="loginForm" class="auth-form active" autocomplete="off">
          <div id="loginMsg" class="form-message"></div>
          <div class="form-group">
            <label class="form-label">邮箱</label>
            <div class="form-field">
              <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              <input type="email" name="email" class="form-input" placeholder="请输入邮箱" required />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <div class="form-field">
              <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              <input type="password" name="password" class="form-input" placeholder="请输入密码" required />
              <button type="button" class="pwd-toggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="form-submit">登 录</button>
        </form>

        <!-- Register -->
        <form id="registerForm" class="auth-form" autocomplete="off">
          <div id="regMsg" class="form-message"></div>
          <div class="form-group">
            <label class="form-label">用户名</label>
            <div class="form-field">
              <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              <input type="text" name="username" class="form-input" placeholder="2-30个字符" required maxlength="30" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">邮箱</label>
            <div class="form-field">
              <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              <input type="email" name="email" class="form-input" placeholder="请输入邮箱" required />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <div class="form-field">
              <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              <input type="password" name="password" class="form-input" placeholder="至少6位，包含字母和数字" required />
              <button type="button" class="pwd-toggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">确认密码</label>
            <div class="form-field">
              <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
              <input type="password" name="password2" class="form-input" placeholder="再次输入密码" required />
            </div>
          </div>
          <button type="submit" class="form-submit">注 册</button>
        </form>

      </div>
    </div>

  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
